name: Clean Challenges Daily

on:
  schedule:
    - cron: "0 2 * * *"  # 2h du matin UTC
  workflow_dispatch: # permet de tester manuellement

jobs:
  call-api:
    runs-on: ubuntu-latest

    steps:
      - name: Call Supabase Edge Function
        run: |
          curl -X POST "https://bsqlkdbvuodxombxfljp.supabase.co/functions/v1/clean-challenge" \
          -H "Content-Type: application/json"